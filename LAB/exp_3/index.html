<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPERIMENT_03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="mainCard">
    <h1 id="heading">Welcome to JavaScript Lab</h1>
    
    <input type="text" id="textInput" placeholder="Enter new heading text">
    
    <div class="button-group">
        <button id="btnHeading">Change Heading</button>
        <button id="btnBg">Change Background</button>
        <button id="btnFont">Increase Font Size</button>
        <button id="btnToggle">Show/Hide Paragraph</button>
        <button id="btnReset">Reset</button>
    </div>

    <p id="paragraph">This is a sample paragraph. JavaScript events can dynamically change content.</p>
</div>
</body>
<script src="scriptjs" ></script>
</html>
